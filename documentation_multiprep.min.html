function renderTree() {
  const tree = document.querySelector("#tree");
  tree.innerHTML = "";

  treeItems.forEach((item) => {
    const button = document.createElement("button");
    button.type = "button";
    button.className = "tree__item";
    button.dataset.id = item.id;
    button.dataset.depth = item.depth;
    button.innerHTML = `<span class="tree__type">${item.type === "folder" ? "dir" : "file"}</span><span>${item.label}</span>`;
    button.addEventListener("click", () => selectDoc(item.id));
    tree.appendChild(button);
  });
}

function renderDoc(doc) {
  const content = document.querySelector("#content");
  const tags = [doc.type].filter(Boolean).map((tag) => `<span class="tag">${tag}</span>`).join("");

  let html = `
    <article class="doc"><section class="hero"><h2>${doc.title}</h2><p class="summary">${doc.summary || ""}</p><div class="tags">${tags}</div></section>
  `;

  if (doc.details) {
    html += renderDetails(doc.details);
  }
  if (doc.imports) {
    html += renderTableSection("Imports expliqués", ["Import", "Rôle", "Pourquoi ici"], doc.imports);
  }
  if (doc.classes) {
    html += renderTableSection("Classes", ["Classe", "Responsabilité", "Attributs importants", "Méthodes principales"], doc.classes);
  }
  if (doc.functions) {
    html += renderTableSection("Fonctions et méthodes", ["Fonction", "Paramètres", "Rôle", "Sortie", "Moment d'appel"], doc.functions);
  }
  if (doc.sections) {
    doc.sections.forEach((section) => {
      html += renderListSection(section.title, section.items);
    });
  }

  html += `</article>`;
  content.innerHTML = html;
}

function renderDetails(rows) {
  return `
    <section class="section card"><h3>Explication</h3><table class="detail-table"><tbody>
          ${rows.map(([label, value]) => `<tr><th>${label}</th><td>${value}</td></tr>`).join("")}
        </tbody></table></section>
  `;
}

function renderTableSection(title, headers, rows) {
  return `
    <section class="section card"><h3>${title}</h3><table class="detail-table"><thead><tr>${headers.map((header) => `<th>${header}</th>`).join("")}</tr></thead><tbody>
          ${rows.map((row) => `<tr>${row.map((cell) => `<td>${cell}</td>`).join("")}</tr>`).join("")}
        </tbody></table></section>
  `;
}

function renderListSection(title, items) {
  return `
    <section class="section card"><h3>${title}</h3><ul class="list">
        ${items.map((item) => `<li>${item}</li>`).join("")}
      </ul></section>
  `;
}

function selectDoc(id) {
  const doc = docs[id] || docs.overview;
  renderDoc(doc);
  document.querySelectorAll(".tree__item").forEach((button) => {
    button.classList.toggle("is-active", button.dataset.id === id);
  });
  document.querySelector("#content").focus({ preventScroll: true });
}

document.querySelector("#overviewButton").addEventListener("click", () => {
  renderDoc(docs.overview);
  document.querySelectorAll(".tree__item").forEach((button) => button.classList.remove("is-active"));
});

renderTree();
renderDoc(docs.overview);
